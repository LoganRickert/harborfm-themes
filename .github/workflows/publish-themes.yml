name: Publish theme zips

on:
  push:
    tags:
      - "publish-*"
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate and pack
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zip
          node scripts/validate-and-pack.mjs
          ls -la dist

      - name: Publish per-theme releases and catalog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/publish-releases.mjs
